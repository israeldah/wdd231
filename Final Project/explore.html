<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SoundPulse Explorer — Parcourez la musique par genre, filtrez et triez les résultats, écoutez des préécoutes de 30 secondes.">
  <meta name="author" content="Dah Evangelis Israël">
  <title>Explorer — SoundPulse</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/theme.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Aller au contenu principal</a>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo" aria-label="SoundPulse — Accueil">
        <span class="logo-icon" aria-hidden="true">🎵</span>
        SoundPulse
      </a>

      <nav class="site-nav" aria-label="Navigation principale">
        <button id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Ouvrir le menu">
          <span></span><span></span><span></span>
        </button>
        <ul id="nav-menu" role="list">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="explore.html">Explorer</a></li>
          <li><a href="contact.html">Contact &amp; Favoris</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button id="theme-toggle" aria-label="Changer de thème" title="Changer de thème">🌙</button>
      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main id="main-content">

    <h1 style="margin-bottom: 1.25rem;">Explorer la Musique</h1>

    <!-- Genre navigation -->
    <nav class="genre-nav" aria-label="Filtrer par genre musical">
      <ul id="genre-list" class="genre-list" role="list" aria-label="Genres musicaux">
        <!-- Populated by explore.js -->
      </ul>
    </nav>

    <!-- Filter & Sort toolbar -->
    <div class="filter-toolbar" role="search" aria-label="Filtrer et trier les morceaux">
      <label for="filter-input" class="visually-hidden">Filtrer les morceaux</label>
      <input
        type="search"
        id="filter-input"
        placeholder="Filtrer par titre, artiste, album…"
        aria-label="Filtrer les morceaux affichés">

      <label for="sort-select" class="visually-hidden">Trier par</label>
      <select id="sort-select" aria-label="Trier les morceaux">
        <option value="">Tri par défaut</option>
        <option value="title-asc">Titre A → Z</option>
        <option value="title-desc">Titre Z → A</option>
        <option value="artist-asc">Artiste A → Z</option>
        <option value="artist-desc">Artiste Z → A</option>
        <option value="duration-asc">Durée croissante</option>
        <option value="duration-desc">Durée décroissante</option>
      </select>
    </div>

    <!-- Results -->
    <section aria-labelledby="results-title">
      <div class="section-header">
        <h2 id="results-title">Top Charts</h2>
      </div>

      <div id="results-grid" class="tracks-grid" aria-live="polite" aria-label="Résultats musicaux">
        <!-- Populated by explore.js -->
      </div>
    </section>

  </main>

  <!-- ── Modal ───────────────────────────────────────────────────────────── -->
  <div id="track-modal" hidden aria-modal="true"></div>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; <span id="footer-year"></span> SoundPulse — Dah Evangelis Israël | WDD 231</p>
      <nav class="footer-links" aria-label="Liens du pied de page">
        <a href="attributions.html">Attributions</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>

  <script type="module" src="scripts/explore.js"></script>
</body>
</html>
